name: MyAwesomeApp
options:
  bundleIdPrefix: com.yourcompany

targets:
  MyAwesomeApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: App
      - path: Config
      - path: Models
      - path: Resources
      - path: Services
      - path: Views
    settings:
      base:
        # Cấu hình giúp tối ưu bộ nhớ khi build trên CI (tránh lỗi OOM)
        SWIFT_COMPILATION_MODE: incremental
        SWIFT_OPTIMIZATION_LEVEL: -Onone
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
          SWIFT_OPTIMIZATION_LEVEL: -O

schemes:
  MyAwesomeApp:
    build:
      targets:
        MyAwesomeApp: [run, test, profile, analyze]
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    test:
      config: Debug
