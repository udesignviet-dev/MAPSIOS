name: MAPSIOS

options:
  bundleIdPrefix: com.yourcompany

targets:
  MAPSIOS:
    type: application
    platform: iOS
    deploymentTarget: "15.0"

    sources:
      - App
      - Config
      - Models
      - Resources
      - Services
      - Views

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.mapsios
        SWIFT_COMPILATION_MODE: incremental
        SWIFT_OPTIMIZATION_LEVEL: -Onone
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO

schemes:
  MAPSIOS:
    build:
      targets:
        MAPSIOS: all
